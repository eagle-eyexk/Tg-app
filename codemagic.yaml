workflows:
  tiligo-ios-workflow:
    name: TiliGo iOS - TestFlight & App Store
    max_build_duration: 60
    integrations:
      app_store_connect: tiligo_asc
    environment:
      ios_signing:
        provisioning_profiles:
          - "m"
        certificates:
          - "tiligo_ios"
      xcode: 16.4
      vars:
        APP_ID: "6777145744"
        BUNDLE_ID: "com.tiligo.tilgo"
        XCODE_PROJECT: "mobile-app-swift/TiliGo.xcodeproj"
        XCODE_SCHEME: "TiliGo"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Increment build number
        script: |
          LATEST=$(app-store-connect get-latest-app-store-build-number "$APP_ID" 2>/dev/null || echo "0")
          cd "$CM_BUILD_DIR/mobile-app-swift"
          agvtool new-version -all $(( LATEST + 1 ))

      - name: Set up code signing
        script: |
          xcode-project use-profiles \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT"

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --config Release

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Logs/gym/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_app_store: true
        release_type: MANUAL
