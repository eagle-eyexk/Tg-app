workflows:
  tiligo-ios-workflow:
    name: TiliGo iOS - Build & Publish
    max_build_duration: 60
    integrations:
      app_store_connect: tiligo_asc
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.tiligo.tilgo
      vars:
        APP_ID: "6777145744"
        BUNDLE_ID: "com.tiligo.tilgo"
      node: 20
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install npm dependencies
        script: |
          cd mobile-app
          npm install

      - name: Sync Capacitor web assets
        script: |
          cd mobile-app
          npx cap sync ios

      - name: Install CocoaPods dependencies
        script: |
          cd mobile-app/ios/App
          pod install

      - name: Increment build number
        script: |
          LATEST=$(app-store-connect get-latest-app-store-build-number "$APP_ID" 2>/dev/null || echo "0")
          cd mobile-app/ios/App
          agvtool new-version -all $(( LATEST + 1 ))

      - name: Set up code signing
        script: |
          cd mobile-app/ios/App
          xcode-project use-profiles

      - name: Build IPA
        script: |
          cd mobile-app/ios
          xcode-project build-ipa \
            --workspace "App/App.xcworkspace" \
            --scheme "App"

    artifacts:
      - mobile-app/ios/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Logs/gym/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_app_store: true
        release_type: MANUAL
